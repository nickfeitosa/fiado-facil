<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiado Fácil</title>

    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <div class="container">

        <h1>Fiado Fácil</h1>

        <p class="subtitle">
            Gestão de crédito informal para microempreendedores
        </p>

        <section class="card">
            <h2>Dashboard</h2>

            <div class="dashboard">

                <div class="metric">
                    <span id="totalClients">0</span>
                    <small>Clientes</small>
                </div>

                <div class="metric">
                    <span id="totalPurchases">0</span>
                    <small>Compras</small>
                </div>

                <div class="metric">
                    <span id="totalOpenAmount">R$ 0,00</span>
                    <small>Em aberto</small>
                </div>

                <div class="metric">
                    <span id="overdueClients">0</span>
                    <small>Inadimplentes</small>
                </div>

            </div>
        </section>

        <section class="card">

            <h2>Cadastrar Cliente</h2>

            <form id="clientForm">

                <label for="name">
                    Nome
                </label>

                <input
                    id="name"
                    type="text"
                    required
                >

                <label for="phone">
                    Telefone
                </label>

                <input
                    id="phone"
                    type="text"
                    required
                >

                <button type="submit">
                    Salvar Cliente
                </button>

            </form>

        </section>

        <section class="card">

            <h2>Registrar Compra</h2>

            <form id="purchaseForm">

                <label for="clientSelect">
                    Cliente
                </label>

                <select
                    id="clientSelect"
                    required
                ></select>

                <label for="product">
                    Produto
                </label>

                <input
                    id="product"
                    type="text"
                    required
                >

                <label for="value">
                    Valor
                </label>

                <input
                    id="value"
                    type="number"
                    step="0.01"
                    required
                >

                <label for="purchaseDate">
                    Data
                </label>

                <input
                    id="purchaseDate"
                    type="date"
                    required
                >

                <button type="submit">
                    Registrar Compra
                </button>

            </form>

        </section>

        <section class="card">

            <h2>Clientes Cadastrados</h2>

            <table id="clientsTable">

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Saldo</th>
                    </tr>
                </thead>

                <tbody id="clientsTableBody">
                </tbody>

            </table>

        </section>

        <section class="card">

            <h2>Compras Recentes</h2>

            <table id="purchasesTable">

                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Valor</th>
                        <th>Data</th>
                    </tr>
                </thead>

                <tbody id="purchasesTableBody">
                </tbody>

             </table>

        </section>

        <section class="card">

            <h2>Comprovante</h2>

            <textarea
                id="receipt"
                rows="10"
                readonly
            ></textarea>

            <button id="copyReceipt">
                Copiar Comprovante
            </button>

        </section>

    </div>

    <script src="/static/app.js"></script>

</body>
</html>
